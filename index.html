<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Azure Data Engineering Interview Guide</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<meta name="theme-color" content="#0F2D4E">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;
    background:#081420;
}

#app{
    width:100%;
    height:100%;
}

/* ---------- Background ---------- */

.unlock-container{

    position:fixed;

    inset:0;

    display:flex;

    justify-content:center;

    align-items:center;

    background:
    linear-gradient(135deg,#0F172A,#153A66);

    backdrop-filter:blur(16px);

}

/* ---------- Card ---------- */

.unlock-card{

    width:430px;

    background:#ffffff;

    border-radius:18px;

    padding:40px;

    box-shadow:
        0 30px 70px rgba(0,0,0,.35);

    animation:pop .35s ease;

}

/* ---------- Animation ---------- */

@keyframes pop{

    from{

        opacity:0;

        transform:translateY(20px) scale(.95);

    }

    to{

        opacity:1;

        transform:none;

    }

}

/* ---------- Heading ---------- */

.unlock-card h1{

    font-size:27px;

    margin-bottom:10px;

    color:#143A63;

}

.unlock-card p{

    color:#666;

    margin-bottom:24px;

}

/* ---------- Input ---------- */

#password{

    width:100%;

    padding:14px 16px;

    border-radius:10px;

    border:1px solid #ddd;

    outline:none;

    font-size:15px;

    transition:.2s;

}

.password-box{

    position:relative;

}

.password-box input{

    width:100%;

    padding:14px 45px 14px 15px;

}

.eye{

    position:absolute;

    right:15px;

    top:50%;

    transform:translateY(-50%);

    cursor:pointer;

    font-size:18px;

    user-select:none;

}

#password:focus{

    border-color:#2563eb;

    box-shadow:0 0 0 4px rgba(37,99,235,.15);

}

/* ---------- Remember ---------- */

.remember{

    display:flex;

    align-items:center;

    gap:10px;

    margin:18px 0 24px;

    font-size:14px;

    color:#555;

}

/* ---------- Button ---------- */

#unlock{

    width:100%;

    border:none;

    border-radius:10px;

    padding:14px;

    cursor:pointer;

    background:#2563eb;

    color:white;

    font-size:15px;

    font-weight:600;

    transition:.25s;

}

.loader{

    width:18px;

    height:18px;

    border:3px solid rgba(255,255,255,.4);

    border-top-color:white;

    border-radius:50%;

    animation:spin .8s linear infinite;

    display:inline-block;

    margin-right:10px;

    vertical-align:middle;

}

@keyframes spin{

    to{

        transform:rotate(360deg);

    }

}

#unlock:hover{

    transform:translateY(-2px);

    background:#1d4ed8;

}

#unlock:disabled{

    background:#8aaef7;

    cursor:not-allowed;

}

/* ---------- Error ---------- */

#error{

    margin-top:18px;

    color:#dc2626;

    text-align:center;

    font-weight:600;

}

/* ---------- Credits ---------- */

.credits{

    margin-top:22px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    font-size:12px;

    color:#777;

}

.credits a{

    color:#2563eb;

    text-decoration:none;

    font-weight:600;

}

.credits a:hover{

    text-decoration:underline;

}

.version{

    padding:4px 10px;

    border-radius:20px;

    background:#2563eb;

    color:#fff;

    font-size:11px;

    font-weight:700;

    letter-spacing:.5px;

    box-shadow:0 2px 8px rgba(37,99,235,.3);

}

</style>

</head>

<body>

<div id="app"></div>

<script>
    window.APP_VERSION = "v1.0.72";
</script>

<script src="loader.js"></script>

</body>

</html>
