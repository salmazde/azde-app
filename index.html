<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Azure Data Engineering Interview Guide</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<meta name="theme-color" content="#0F2D4E">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{

    margin:0;
    min-height:100vh;

    font-family:'Segoe UI',system-ui,sans-serif;

    background:
        radial-gradient(circle at top right,
        rgba(66,165,245,.15),
        transparent 30%),

        radial-gradient(circle at bottom left,
        rgba(21,101,192,.18),
        transparent 35%),

        linear-gradient(
            135deg,
            #0F2D4E 0%,
            #173E67 45%,
            #1565C0 100%
        );

}

#app{
    width:100%;
    height:100%;
}

/* ---------- Background ---------- */

.unlock-container{

    display:flex;

    justify-content:center;

    align-items:center;

    min-height:100vh;

    padding:30px;

}

/* ---------- Card ---------- */
.unlock-card{

    width:460px;

    background:rgba(22,27,34,.92);

    backdrop-filter:blur(18px);

    border-radius:20px;

    padding:40px;

    border:1px solid rgba(255,255,255,.08);

    box-shadow:

        0 25px 70px rgba(0,0,0,.45);

}

/* ---------- Animation ---------- */

@keyframes pop{

    from{

        opacity:0;

        transform:translateY(20px) scale(.95);

    }

    to{

        opacity:1;

        transform:none;

    }

}

/* ---------- Heading ---------- */

.unlock-card h1{

    color:#E6EDF3;

    font-size:35px;

    font-weight:800;

    margin-bottom:10px;

    line-height:1.2;

}

.unlock-card p{

    color:#8B949E;

    font-size:15px;

    margin-bottom:24px;

}

/* ---------- Input ---------- */

#password{

    width:100%;

    padding:14px 16px;

    border-radius:10px;

    border:1px solid #ddd;

    outline:none;

    font-size:15px;

    transition:.2s;

}

.password-box{

    position:relative;

    margin-bottom:18px;

}

.password-box input{

    width:100%;

    padding:16px 52px 16px 18px;

    border-radius:12px;

    background:#0D1117;

    border:1px solid #30363D;

    color:#E6EDF3;

    font-size:16px;

    outline:none;

    transition:.25s;

}

.eye{

    position:absolute;

    top:50%;

    right:18px;

    transform:translateY(-50%);

    cursor:pointer;

    color:#90CAF9;

    font-size:20px;

    transition:.2s;

}

.eye:hover{

    transform:translateY(-50%) scale(1.15);

}

.password-box input:focus{

    border-color:#64B5F6;

    box-shadow:

        0 0 0 4px rgba(100,181,246,.18);

}
/* ---------- Remember ---------- */

.remember{

    display:flex;

    align-items:center;

    gap:10px;

    margin:18px 0 24px;

    color:#8B949E;

    font-size:14px;

}

/* ---------- Button ---------- */

#unlock{

    width:100%;

    border:none;

    padding:15px;

    border-radius:12px;

    background:#1565C0;

    color:white;

    font-size:17px;

    font-weight:700;

    cursor:pointer;

    transition:.25s;

}

.loader{

    width:18px;

    height:18px;

    border-radius:50%;

    border:2px solid rgba(255,255,255,.3);

    border-top:2px solid white;

    display:inline-block;

    animation:spin .8s linear infinite;

    margin-right:10px;

}

@keyframes spin{

    to{

        transform:rotate(360deg);

    }

}

@keyframes spin{

    to{

        transform:rotate(360deg);

    }

}

#unlock:hover{

    background:#1976D2;

    transform:translateY(-2px);

    box-shadow:

        0 10px 30px rgba(21,101,192,.35);

}

#unlock:disabled{

    background:#8aaef7;

    cursor:not-allowed;

}

/* ---------- Error ---------- */

#error{

    margin-top:18px;

    color:#dc2626;

    text-align:center;

    font-weight:600;

}

/* ---------- Credits ---------- */

.credits{

    margin-top:28px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    color:#8B949E;

    font-size:13px;

}

.credits a{

    color:#64B5F6;

    text-decoration:none;

    font-weight:600;

}

.credits a:hover{

    text-decoration:underline;

}

.version{

    background:#1565C0;

    color:white;

    border-radius:999px;

    padding:5px 12px;

    font-size:12px;

    font-weight:700;

    box-shadow:

        0 8px 18px rgba(21,101,192,.35);

}

</style>

</head>

<body>

<div id="app"></div>

<script>
    window.APP_VERSION = "v1.0.102";
</script>

<script src="loader.js"></script>

</body>

</html>
